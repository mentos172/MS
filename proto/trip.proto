syntax = "proto3";

package trip;

option go_package = "shared/proto/trip;trip";
//Определяет RPC-метод PreviewTrip, который 
//принимает PreviewTripRequest и возвращает PreviewTripResponse
service TripService {
  rpc PreviewTrip(PreviewTripRequest) returns (PreviewTripResponse);
  rpc CreateTrip(CreateTripRequest) returns (CreateTripResponse);
  
}
//Запрос с ID пользователя и начальной/конечной точками поездки 
message PreviewTripRequest {
  string userID = 1;
  Coordinate startLocation = 2;
  Coordinate endLocation = 3;
}
//Ответ с ID поездки, маршрутом и списком предложений
message PreviewTripResponse {
  string tripID = 1;
  Route route = 2;
  repeated RideFare rideFares = 3;
}
// координаты
message Coordinate {
  double latitude = 1;
  double longitude = 2;
}

message Geometry {
  repeated Coordinate coordinates = 1;
}
//маршрут расстояние и время
message Route {
  repeated Geometry geometry = 1;
  double distance = 2;
  double duration = 3;
}
//цена
message RideFare {
  string id = 1;
  string userID = 2;
  string packageSlug = 3;
  double totalPriceInCents = 4;
}
message CreateTripRequest {
  string rideFareID = 1;
  string userID = 2;
}

message CreateTripResponse {
  string tripID = 1;
   Trip trip = 2;
}

message Trip {
  string id = 1;
  RideFare selectedFare = 2;
  Route route = 3;
  string status = 4;
  string userID = 5;
  TripDriver driver = 6;
}

// Static driver object that is used to store the driver information
message TripDriver {
  string id = 1;
  string name = 2;
  string profilePicture = 3;
  string carPlate = 4;
}